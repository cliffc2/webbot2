            border-radius: 10px; border: 1px solid #333;
            max-width: 300px; z-index: 100; color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;

        #status { color: #666; }
        h1 { font-size: 18px; margin: 0 0 10px 0; color: #00d4ff; }
        .legend { display: flex; gap: 10px; margin-bottom: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>

        <div><div class="dot" style="background:#4ecdc4"></div> Prediction</div>
        <div><div class="dot" style="background:#ffe66d"></div> Theme</div>

<script>

source", "weight": 1.0}, {"source": "source_analysis.json", "target": "pred_1", "relationship": "from_source", "weight": 1.0}, {"source": "source_analysis.json", "target": "pred_2", "relationship": "from_source", "weight": 1.0}, {"source": "source_analysis.json", "target": "pred_3", "relationship": "from_source", "weight": 1.0}, {"source": "source_analysis.json", "target": "pred_4", "relationship": "from_source", "weight": 1.0}, {"source": "source_analysis.json", "target": "pred_5", "relationship": "from_source", "weight": 1.0}, {"source": "source_analysis.json", "target": "pred_6", "relationship": "from_source", "weight": 1.0}, {"source": "source_analysis.json", "target": "pred_7", "relationship": "from_source", "weight": 1.0}, {"source": "source_analysis.json", "target": "archetype_Herald", "relationship": "has_archetype", "weight": 1.0}, {"source": "source_analysis.json", "target": "archetype_Trickster", "relationship": "has_archetype", "weight": 1.0}, {"source": "source_analysis.json", "target": "archetype_Warrior", "relationship": "has_archetype", "weight": 1.0}, {"source": "source_analysis.json", "target": "archetype_Shadow", "relationship": "has_archetype", "weight": 1.0}, {"source": "source_analysis.json", "target": "archetype_Shapeshifter", "relationship": "has_archetype", "weight": 1.0}, {"source": "source_analysis.json", "target": "metaphor_Weighing Scales", "relationship": "has_metaphor", "weight": 1.0}, {"source": "source_analysis.json", "target": "metaphor_Dollar Empire Dying", "relationship": "has_metaphor", "weight": 1.0}, {"source": "source_analysis.json", "target": "metaphor_Road of Storms", "relationship": "has_metaphor", "weight": 1.0}, {"source": "source_analysis.json", "target": "metaphor_Cancer Magnet", "relationship": "has_metaphor", "weight": 1.0}, {"source": "source_analysis.json", "target": "metaphor_Strange Attractor / Plop", "relationship": "has_metaphor", "weight": 1.0}, {"source": "pred_0", "target": "pred_4", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_0", "target": "pred_5", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_0", "target": "pred_6", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_0", "target": "pred_7", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_0", "target": "theme_marchapril", "relationship": "has_theme", "weight": 1.0}, {"source": "pred_3", "target": "pred_5", "relationship": "keyword_similarity", "weight": 0.2}, {"source": "pred_3", "target": "pred_7", "relationship": "keyword_similarity", "weight": 0.2}, {"source": "pred_3", "target": "theme_wave", "relationship": "has_theme", "weight": 1.0}, {"source": "pred_4", "target": "pred_5", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_4", "target": "pred_6", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_4", "target": "pred_7", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_4", "target": "theme_marchapril", "relationship": "has_theme", "weight": 1.0}, {"source": "pred_5", "target": "pred_6", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_5", "target": "pred_7", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_5", "target": "theme_wave", "relationship": "has_theme", "weight": 1.0}, {"source": "pred_6", "target": "pred_7", "relationship": "temporal_proximity", "weight": 1.0}, {"source": "pred_7", "target": "theme_wave", "relationship": "has_theme", "weight": 1.0}]};

// Try to load from URL param, fallback to embedded
let graphData = defaultData;
const urlParams = new URLSearchParams(window.location.search);
const fileParam = urlParams.get('file');

if (fileParam) {
    fetch(fileParam)
        .then(res => res.json())
        .then(data => { graphData = data; initGraph(); })
        .catch(() => { initGraph(); });
} else {
    initGraph();
}

function initGraph() {

const colors = {
    "source": "#ff6b6b",
    "prediction": "#4ecdc4",
    "theme": "#ffe66d",
    "theme_cluster": "#95e1d3"
};

const nodes = graphData.nodes.map(n => ({...n}));
const links = graphData.edges.map(e => ({...e}));

const svg = d3.select("body").append("svg")
    .attr("width", window.innerWidth)
    .attr("height", window.innerHeight);

const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(80))
    .force("charge", d3.forceManyBody().strength(-300))
    .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));

svg.append("g").selectAll("line")
    .data(links).join("line")
    .attr("stroke", "#444")
    .attr("stroke-width", d => Math.min(d.weight || 1, 2));

svg.append("g").selectAll("circle")
    .data(nodes).join("circle")
    .attr("r", d => d.type === 'source' ? 15 : d.type === 'prediction' ? 10 : 6)
    .attr("fill", d => colors[d.type] || "#666")
    .call(d3.drag()
        .on("start", e => { if (!e.active) sim.alphaTarget(0.3).restart(); e.subject.fx = e.subject.x; e.subject.fy = e.subject.y; })
        .on("drag", e => { e.subject.fx = e.x; e.subject.fy = e.y; })
        .on("end", e => { if (!e.active) sim.alphaTarget(0); e.subject.fx = null; e.subject.fy = null; }));

svg.append("g").selectAll("text")
    .data(nodes).join("text")
    .text(d => d.label ? d.label.substring(0, 15) : d.id.substring(0, 10))
    .attr("font-family", "Helvetica, Arial, sans-serif")
    .attr("font-size", d => d.type === 'source' ? 12 : 9)
    .attr("fill", "#fff")
    .attr("text-anchor", "middle")
    .attr("dy", d => d.type === 'source' ? 25 : 18);

sim.on("tick", () => {
    svg.selectAll("line")
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    svg.selectAll("circle")
        .attr("cx", d => d.x).attr("cy", d => d.y);
    svg.selectAll("text")
        .attr("x", d => d.x).attr("y", d => d.y);
});

document.getElementById('status').innerHTML = 'Graph loaded: ' + nodes.length + ' nodes, ' + links.length + ' edges';
}
</script>
</body>
</html>
